<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - LivingEnglish Kids</title>
  <link rel="icon" type="image/png" href="image.png">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1E3A8A 0%, #2D4BA0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background shapes */
    .shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(251, 191, 36, 0.1);
    }

    .shape-1 {
      width: 400px;
      height: 400px;
      top: -200px;
      right: -200px;
    }

    .shape-2 {
      width: 300px;
      height: 300px;
      bottom: -150px;
      left: -150px;
    }

    .shape-3 {
      width: 200px;
      height: 200px;
      bottom: 200px;
      right: 100px;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      position: relative;
      z-index: 10;
    }

    .login-card {
      background: white;
      border-radius: 30px;
      padding: 3rem 2.5rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 0.6s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo a {
      font-size: 2rem;
      font-weight: 800;
      color: #1E3A8A;
      text-decoration: none;
      font-family: 'Fredoka', sans-serif;
    }

    .logo span {
      color: #FBBF24;
    }

    .logo i {
      font-size: 2.5rem;
      color: #FBBF24;
      margin-right: 0.5rem;
    }

    .logo small {
      display: block;
      font-size: 0.9rem;
      color: #6B7280;
      margin-top: 0.5rem;
      font-family: 'Poppins', sans-serif;
    }

    h2 {
      text-align: center;
      color: #1E3A8A;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
    }

    .subtitle {
      text-align: center;
      color: #6B7280;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #1F2937;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .form-group label i {
      color: #FBBF24;
      margin-right: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9CA3AF;
      font-size: 1.1rem;
    }

    .form-group input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      border: 2px solid #E5E7EB;
      border-radius: 15px;
      font-size: 1rem;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }

    .form-group input:focus {
      outline: none;
      border-color: #FBBF24;
      box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1);
    }

    .password-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .forgot-password {
      color: #1E3A8A;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .forgot-password:hover {
      color: #FBBF24;
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #1E3A8A 0%, #FBBF24 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(251, 191, 36, 0.3);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: #FEE2E2;
      border: 1px solid #FECACA;
      color: #DC2626;
      padding: 1rem;
      border-radius: 10px;
      margin-top: 1rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
    }

    .error-message.show {
      display: flex;
    }

    .error-message i {
      font-size: 1.1rem;
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }

    .back-link a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.3s;
    }

    .back-link a:hover {
      color: #FBBF24;
    }

    .back-link a i {
      margin-right: 0.5rem;
    }

    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #E5E7EB;
      color: #9CA3AF;
      font-size: 0.85rem;
    }

    .security-badge i {
      color: #10B981;
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      z-index: 3000;
      display: none;
      align-items: center;
      gap: 1rem;
      animation: slideIn 0.3s ease;
    }

    .toast.show {
      display: flex;
    }

    .toast.success {
      border-left: 4px solid #28a745;
    }

    .toast.error {
      border-left: 4px solid #dc3545;
    }

    .toast i {
      font-size: 1.5rem;
    }

    .toast.success i {
      color: #28a745;
    }

    .toast.error i {
      color: #dc3545;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <!-- Background Shapes -->
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">
    <i class="fas"></i>
    <span id="toastMessage"></span>
  </div>

  <div class="login-container" data-aos="fade-up">
    <div class="login-card">
      <div class="logo">
        <a href="index.html">
          <i class="fas fa-child"></i>
          Living<span>English</span> Kids
        </a>
        <small>Admin Portal</small>
      </div>

      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to manage inquiries and programs</p>

      <form id="loginForm">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="admin@livingenglish.com" required autofocus>
          </div>
        </div>

        <div class="form-group">
          <div class="password-header">
            <label><i class="fas fa-lock"></i> Password</label>
            <a href="#" class="forgot-password" onclick="showForgotPassword(event)">Forgot Password?</a>
          </div>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>

        <div id="errorMessage" class="error-message">
          <i class="fas fa-exclamation-circle"></i>
          <span id="errorText"></span>
        </div>
      </form>

      <div class="security-badge">
        <i class="fas fa-shield-alt"></i>
        <span>Secure admin access · Protected area</span>
        <i class="fas fa-lock"></i>
      </div>
    </div>

    <div class="back-link">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  
  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyB3Wyz8KVK1lbJHvBp-GJN4OgbHaJxWTck",
      authDomain: "lektz-daea4.firebaseapp.com",
      projectId: "lektz-daea4",
      storageBucket: "lektz-daea4.firebasestorage.app",
      messagingSenderId: "554357206195",
      appId: "1:554357206195:web:e2ebbcc0b18c3feec354c6",
      measurementId: "G-GNFXKQ16SN"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Initialize AOS
    AOS.init({
      duration: 1000,
      once: true
    });

    // Toast notification function
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toastMessage');
      const toastIcon = toast.querySelector('i');
      
      toast.className = `toast ${type}`;
      toastIcon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
      toastMessage.textContent = message;
      
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 5000);
    }

    // Handle login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const errorMessage = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');
      
      // Validate inputs
      if (!email || !password) {
        errorText.textContent = 'Please enter both email and password';
        errorMessage.classList.add('show');
        return;
      }
      
      // Disable button
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
      errorMessage.classList.remove('show');
      
      try {
        // Sign in with Firebase Auth
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Check if user is admin (you can store admin emails in Firestore)
        const adminDoc = await getDoc(doc(db, "admins", user.uid));
        
        if (adminDoc.exists() || email.endsWith('@livingenglish.com') || email === 'admin@lektz.org') {
          // Store admin session
          localStorage.setItem('adminAuthenticated', 'true');
          localStorage.setItem('adminEmail', email);
          localStorage.setItem('adminUid', user.uid);
          
          showToast('Login successful! Redirecting...', 'success');
          
          // Redirect to dashboard
          setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
          }, 1500);
        } else {
          // Not an admin - sign out
          await auth.signOut();
          throw new Error('Unauthorized access. Admin privileges required.');
        }
        
      } catch (error) {
        console.error('Login error:', error);
        
        let errorMsg = 'Invalid email or password';
        if (error.code === 'auth/user-not-found') {
          errorMsg = 'No account found with this email';
        } else if (error.code === 'auth/wrong-password') {
          errorMsg = 'Incorrect password';
        } else if (error.code === 'auth/too-many-requests') {
          errorMsg = 'Too many failed attempts. Try again later.';
        } else if (error.message) {
          errorMsg = error.message;
        }
        
        errorText.textContent = errorMsg;
        errorMessage.classList.add('show');
        showToast(errorMsg, 'error');
        
        // Reset button
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      }
    });

    // Forgot password function
    window.showForgotPassword = async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      
      if (!email) {
        showToast('Please enter your email address first', 'error');
        document.getElementById('email').focus();
        return;
      }
      
      try {
        await sendPasswordResetEmail(auth, email);
        showToast('Password reset email sent! Check your inbox.', 'success');
      } catch (error) {
        console.error('Reset password error:', error);
        
        let errorMsg = 'Error sending reset email';
        if (error.code === 'auth/user-not-found') {
          errorMsg = 'No account found with this email';
        }
        
        showToast(errorMsg, 'error');
      }
    };

    // Check if already logged in
    (async () => {
      const adminAuth = localStorage.getItem('adminAuthenticated');
      if (adminAuth === 'true') {
        // Verify with Firebase
        try {
          const user = auth.currentUser;
          if (user) {
            const adminDoc = await getDoc(doc(db, "admins", user.uid));
            if (adminDoc.exists() || user.email.endsWith('@livingenglish.com')) {
 window.location.href = 'admin-dashboard.html';
            }
          }
        } catch (error) {
          console.log('Not authenticated');
        }
      }
    })();
  </script>
</body>
</html>
